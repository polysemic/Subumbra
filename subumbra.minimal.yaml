# Subumbra manifest — copy to subumbra.yaml before running bootstrap.
# Edit the values below to match your providers.
# Add, delete, or comment out keys you don't need.
#
# Field reference:
#   key_id       — unique identifier for this key (used in the URL: /t/key_id/...)
#   provider     — unique display label of your choosing; shown in the UI and bootstrap output (not a template name, not used for routing)
#   secret_ref   — name of the env var in .env.bootstrap that holds your API key
#   adapters     — app tokens allowed to use this key (use the same name across keys for a shared token)
#   unique_vault — true for high-isolation keys (separate encryption context); false for shared vault
#   template     — signed built-in template name, or a file in ./templates/<name>.yaml for custom providers

keys:
  - key_id: openai_prod
    provider: openai
    secret_ref: OPENAI_KEY
    adapters: [universal]
    unique_vault: false
    template: openai

  - key_id: anthropic_prod
    provider: anthropic
    secret_ref: ANTHROPIC_KEY
    adapters: [universal]
    unique_vault: false
    template: anthropic


# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM Proxy Config
#
# All models route through the transparent sidecar:
#   api_base: http://subumbra-proxy:8090/t/<key_id>/...
#   api_key:  ${SUBUMBRA_TOKEN_LITELLM} - Update with your actual token in .env
#
# The sidecar extracts the adapter token from Authorization, derives the key_id
# from the proxied path, fetches the encrypted record from subumbra-keys, and
# routes to the CF Worker. Real API keys never appear in this file.
#
# Key_id path segments must match what you entered during bootstrap. If you used
# custom labels, update the api_base values below to match exactly.
# Mismatch symptom: subumbra-keys returns HTTP 403 with reason_code=key_scope_denied.
# Ensure the LiteLLM adapter scope includes all key_ids used here.
# ─────────────────────────────────────────────────────────────────────────────

model_list:

  # ── Anthropic ───────────────────────────────────────────────────────────────
  - model_name: claude-opus-4
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_base: http://subumbra-proxy:8090/t/anthropic_prod
      api_key: ${SUBUMBRA_TOKEN_LITELLM}

  - model_name: claude-sonnet-4
    litellm_params:
      model: anthropic/claude-sonnet-4-5

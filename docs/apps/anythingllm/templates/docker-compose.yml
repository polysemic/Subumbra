# AnythingLLM — Direct Provider Install (round-43-1 BEFORE state)
#
# This is the baseline "already running" config for the takeover round.
# The app talks directly to OpenAI — no Subumbra involved yet.
#
# Keys live in .env (same directory). To switch providers, edit .env and
# change LLM_PROVIDER + force-recreate.
#
# To do the takeover: swap `.env` for the Subumbra takeover examples from
# `docs/apps/anythingllm/takeover.md` and force-recreate.

services:
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    networks:
      - subumbra-net
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /opt/anythingllm/storage:/app/server/storage
    env_file:
      - .env

networks:
  subumbra-net:
    external: true
    name: subumbra-net

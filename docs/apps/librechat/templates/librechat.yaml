version: 1.3.9
cache: true
# ─────────────────────────────────────────────────────────────────────────────
# LibreChat config — Subumbra secure multi-provider pattern
#
# All routes go through the transparent sidecar at http://subumbra-proxy:8090/t
# The credential is the shared LibreChat adapter token.
# The target Subumbra key_id is carried in the path.
# ─────────────────────────────────────────────────────────────────────────────

endpoints:

  anthropic:
    apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
    models:
      - "claude-sonnet-4-6"
      - "claude-opus-4-5"
      - "claude-haiku-4-5-20251001"
    titleConvo: true
    titleModel: "claude-haiku-4-5-20251001"

  custom:

    - name: "OpenAI via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/openai_prod/v1"
      models:
        fetch: true
        default:
          - "gpt-4o-mini"
          - "gpt-4o"
          - "o3"
      modelDisplayLabel: "OpenAI"
      titleConvo: true
      titleModel: "gpt-4o-mini"

    - name: "Groq via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/groq_prod/openai/v1"
      models:
        fetch: true
        default:
          - "llama-3.3-70b-versatile"
          - "llama-3.1-8b-instant"
      modelDisplayLabel: "Groq"
      titleConvo: true
      titleModel: "llama-3.1-8b-instant"

    - name: "DeepSeek via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/deepseek_prod/v1"
      models:
        fetch: true
        default:
          - "deepseek-chat"
          - "deepseek-reasoner"
      modelDisplayLabel: "DeepSeek"

    - name: "Cerebras via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/cerebras_prod/v1"
      models:
        fetch: true
        default:
          - "llama3.1-8b"
      modelDisplayLabel: "Cerebras"

    - name: "Mistral via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/mistral_prod/v1"
      models:
        fetch: true
        default:
          - "mistral-large-latest"
          - "mistral-small-latest"
          - "open-mistral-nemo"
      modelDisplayLabel: "Mistral"
      dropParams:
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "parallel_tool_calls"
        - "stop"

    - name: "OpenRouter via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/openrouter_prod/api/v1"
      models:
        fetch: true
        default:
          - "anthropic/claude-sonnet-4"
      modelDisplayLabel: "OpenRouter"

    - name: "Together via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/together_prod"
      models:
        fetch: false
        default:
          - "meta-llama/Llama-3.3-70B-Instruct-Turbo"
          - "meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo"
      modelDisplayLabel: "Together"

    - name: "xAI via Subumbra"
      apiKey: "${SUBUMBRA_TOKEN_LIBRECHAT}"
      baseURL: "http://subumbra-proxy:8090/t/xai_prod/v1"
      models:
        fetch: true
        default:
          - "grok-3"
      modelDisplayLabel: "xAI"

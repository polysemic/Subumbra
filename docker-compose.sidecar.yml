services:
  subumbra-keys:
    build:
      context: ./subumbra-keys
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - subumbra_keys_data:/app/data
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_ACCESS_TOKEN}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      DATA_DIR: /app/data

  subumbra-proxy:
    build:
      context: ./subumbra-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - external
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_ACCESS_TOKEN}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  subumbra_keys_data:
    driver: local

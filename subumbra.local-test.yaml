# Subumbra local dev manifest — SSH keys & NPM publishing to Verdaccio.
keys:
  # SSH key for GitHub — gates git push/fetch/clone from this machine
  - key_id: github_local
    type: ssh_key
    key_source: generated
    adapters: [sshtest]
    unique_vault: false
    allow:
      hosts:
        - github.com

  # SSH key for VPS access — gates ssh/rsync/scp to the production VPS
  - key_id: vps_access
    type: ssh_key
    key_source: generated
    adapters: [sshtest]
    unique_vault: false
    allow:
      hosts:
        - 62.146.169.39

  # NPM token for publishing — gates npm publish / query from this machine
  - key_id: npm_publish
    type: npm_token
    provider: npmjs
    secret_ref: NPM_TOKEN
    adapters: [npm]
    unique_vault: false
    policy:
      key_id: npm_publish
      policy_id: npm-publish-policy
      protocol: http_rest
      capability_class: custom_rest
      source: env
      target:
        host: httpbin.org
      auth:
        scheme: bearer
      allow:
        adapters: [npm]
        methods: [GET, PUT, DELETE]
        npm_operations: [publish, query, unpublish, dist-tag]
        path_prefixes: [/@polysemic, /-/package, /anything]
        scopes: ["@polysemic"]
        content_types: [application/json]
        max_body_bytes: 10485760
      deny:
        max_tarball_bytes: 5242880
        publish_path_patterns: [.env, .pem, .key, .npmrc, credentials.json]
        publish_content_patterns: [AKIA, npm_, PRIVATE KEY]

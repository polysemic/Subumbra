name: OpenSSF Scorecard

# Scorecard evaluates ~18 security health checks (branch protection,
# pinned dependencies, SAST presence, signed releases, code review, etc.)
# and publishes a numeric score plus a SARIF report to the Security tab.
# Public repos can also display the score as a README badge.
#
# Docs: https://github.com/ossf/scorecard
# Checks: https://github.com/ossf/scorecard/blob/main/docs/checks.md

on:
  push:
    branches: ["main"]
  schedule:
    # Weekly Monday 06:30 UTC — runs after the main security scan window
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the code-scanning dashboard
      security-events: write
      # Required to read the repository's OIDC token to verify the publishing identity
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif

name: OpenSSF Scorecard

# Scorecard evaluates ~18 security health checks (branch protection,
# pinned dependencies, SAST presence, signed releases, code review, etc.)
# and publishes a numeric score plus a SARIF report to the Security tab.
# Public repos can also display the score as a README badge.
#
# Docs: https://github.com/ossf/scorecard
# Checks: https://github.com/ossf/scorecard/blob/main/docs/checks.md

on:
  push:
    branches: ["main"]
  schedule:
    # Weekly Monday 06:30 UTC — runs after the main security scan window
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the code-scanning dashboard
      security-events: write
      # Required to read the repository's OIDC token to verify the publishing identity
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: results.sarif

name: OSSAR

# GitHub's OSS Security Analyzer Runner bundles several open-source
# static-analysis tools (DevSkim, Security Code Scan, CredScan, BinSkim)
# under one workflow and uploads unified SARIF to the Security tab.
#
# Overlap note: bandit + gitleaks + CodeQL already cover most Python
# findings; OSSAR adds value primarily for the Worker's JavaScript code
# and broader pattern-based checks (DevSkim) that the other scanners
# don't run.
#
# Docs: https://github.com/github/ossar-action

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly Monday 06:45 UTC — staggered after Scorecard
    - cron: "45 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ossar:
    name: OSSAR scan
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run OSSAR
        id: ossar
        uses: github/ossar-action@4e96c4f6e591eb4b991abfd459e40b136a317aea # v2.0.0

      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}

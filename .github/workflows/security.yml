name: Security Scans

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly on Monday 06:00 UTC — catches new CVEs against pinned deps
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # needed to upload SARIF results to GitHub Security tab

jobs:

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history required for secret scanning
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        with:
          config-path: scripts/security/gitleaks/.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Run bandit
        run: |
          python3 -m bandit \
            subumbra-keys/app.py \
            subumbra-proxy/app.py \
            ui/app.py \
            subumbra-probe/probe.py \
            bootstrap/subumbra-bootstrap.py \
            --format json \
            --output scripts/security/bandit/reports/bandit-report.json \
            --exit-zero
      - name: Fail on HIGH severity
        run: |
          python3 -c "
          import json, sys
          with open('scripts/security/bandit/reports/bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          if high:
              print(f'FAIL: {len(high)} HIGH severity finding(s)')
              for r in high:
                  print(f'  [{r[\"test_id\"]}] {r[\"issue_text\"]} — {r[\"filename\"]}:{r[\"line_number\"]}')
              sys.exit(1)
          print(f'PASS — no HIGH severity findings')
          "
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: bandit-report
          path: scripts/security/bandit/reports/

  pip-audit:
    name: Dependency CVE Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: >-
            bootstrap/requirements.txt
            subumbra-keys/requirements.txt
            subumbra-proxy/requirements.txt
            subumbra-probe/requirements.txt
            ui/requirements.txt

  trivy:
    name: Filesystem + Dependency Scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: scripts/security/trivy/reports/trivy-report.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: ./.trivyignore.yaml
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        if: always()
        with:
          sarif_file: scripts/security/trivy/reports/trivy-report.sarif
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-report
          path: scripts/security/trivy/reports/

  codeql:
    name: CodeQL (Python + JavaScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
      - uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3

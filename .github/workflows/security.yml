name: Security Scans

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly on Monday 06:00 UTC — catches new CVEs against pinned deps
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history required for secret scanning
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: scripts/security/gitleaks/.gitleaks.toml

  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install bandit toolchain
        run: |
          python3 -m pip install \
            --only-binary=:all: \
            --require-hashes \
            -r scripts/security/bandit/requirements-ci.txt
      - name: Run bandit
        run: |
          python3 -m bandit \
            subumbra-keys/app.py \
            subumbra-proxy/app.py \
            ui/app.py \
            subumbra-probe/probe.py \
            bootstrap/subumbra-bootstrap.py \
            --format json \
            --output scripts/security/bandit/reports/bandit-report.json \
            --exit-zero
      - name: Fail on HIGH severity
        run: |
          python3 -c "
          import json, sys
          with open('scripts/security/bandit/reports/bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          if high:
              print(f'FAIL: {len(high)} HIGH severity finding(s)')
              for r in high:
                  print(f'  [{r[\"test_id\"]}] {r[\"issue_text\"]} — {r[\"filename\"]}:{r[\"line_number\"]}')
              sys.exit(1)
          print(f'PASS — no HIGH severity findings')
          "
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bandit-report
          path: scripts/security/bandit/reports/

  pip-audit:
    name: Dependency CVE Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: >-
            bootstrap/requirements.txt
            subumbra-keys/requirements.txt
            subumbra-proxy/requirements.txt
            subumbra-probe/requirements.txt
            ui/requirements.txt

  trivy:
    name: Filesystem + Dependency Scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: scripts/security/trivy/reports/trivy-report.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          # Apply severity filter to SARIF too — otherwise the action unsets
          # TRIVY_SEVERITY for SARIF output, and the job fails on LOW findings
          # like DS-0026 (missing HEALTHCHECK).
          limit-severities-for-sarif: "true"
          trivyignores: ./.trivyignore.yaml
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        if: always()
        with:
          sarif_file: scripts/security/trivy/reports/trivy-report.sarif
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-report
          path: scripts/security/trivy/reports/

  codeql:
    name: CodeQL (Python + JavaScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml
      - uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

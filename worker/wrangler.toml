name              = "subumbra-proxy"
main              = "src/worker.js"
compatibility_date = "2024-09-23"

# account_id is read from CLOUDFLARE_ACCOUNT_ID env var at deploy time.
# Do not hardcode it here — keep this file safe to commit.

# ── Durable Objects ───────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "SUBUMBRA_VAULT"      # env.SUBUMBRA_VAULT in Worker code
class_name = "SubumbraVault"       # exported class name in worker.js

[[durable_objects.bindings]]
name       = "SUBUMBRA_JANUS"       # env.SUBUMBRA_JANUS in Worker code
class_name = "SubumbraJanus"        # exported class name in worker.js

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SubumbraVault"]

[[migrations]]
tag = "v3"

[[migrations]]
tag = "v4"
new_sqlite_classes = ["SubumbraJanus"]

[[migrations]]
tag = "v5"

  [[migrations.renamed_classes]]
  from = "SubumbraGate"
  to = "SubumbraJanus"


# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled            = true
head_sampling_rate = 1

# ── Runtime secrets (set by bootstrap via `wrangler secret put`) ──────────────
# These are NOT defined here — they live in CF Secrets and are injected at
# runtime as env bindings. Listing them here for documentation only:
#
#   SUBUMBRA_CONSUMER_TOKENS — JSON token map, set by bootstrap
#   SUBUMBRA_JANUS_HMAC_KEY — one-time janus capability HMAC secret
#   SUBUMBRA_JANUS_VAPID_PRIVATE_JWK — browser push private key (JWK JSON)
#   SUBUMBRA_MANAGEMENT_TOKEN — management bearer token, set by bootstrap
#   SUBUMBRA_HMAC_KEY       — HMAC signing key, set by bootstrap
#   SUBUMBRA_SETUP_TOKEN    — transient bootstrap-time setup token
#
# The decrypt private key is not an operator-managed CF Secret anymore.
# It lives inside the SQLite-backed SubumbraVault Durable Object.
#
# KV binding used by the live provider registry.
# Bootstrap appends this binding to the temp wrangler.toml during deploy.
# Do not commit a real namespace id here.
# [[kv_namespaces]]
# binding = "PROVIDER_REGISTRY_KV"
# id = "<bootstrap injected>"

name              = "subumbra-proxy"
main              = "src/worker.js"
compatibility_date = "2024-09-23"

# account_id is read from CLOUDFLARE_ACCOUNT_ID env var at deploy time.
# Do not hardcode it here — keep this file safe to commit.

# ── Durable Objects ───────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "SUBUMBRA_PROXY"      # env.SUBUMBRA_PROXY in Worker code
class_name = "SubumbraProxy"       # exported class name in worker.js

# Required: tell CF about the DO class so it can provision storage
[[migrations]]
tag         = "v1"
new_classes = ["KeyVaultProxy"]

[[migrations]]
tag             = "v2"
renamed_classes = [{ from = "KeyVaultProxy", to = "SubumbraProxy" }]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled            = true
head_sampling_rate = 1

# ── CF Secrets (set by bootstrap via `wrangler secret put`) ───────────────────
# These are NOT defined here — they live in CF Secrets and are injected at
# runtime as env bindings. Listing them here for documentation only:
#
#   WORKER_PRIVATE_KEY      — base64(RSA-4096 PKCS#8 DER), set by bootstrap
#   WORKER_KEY_FINGERPRINT  — sha256:<hex> of SPKI DER, set by bootstrap
#   SUBUMBRA_ACCESS_TOKEN   — hex bearer token, set by bootstrap
#
# KV binding used by the live provider registry.
# Bootstrap appends this binding to the temp wrangler.toml during deploy.
# Do not commit a real namespace id here.
# [[kv_namespaces]]
# binding = "PROVIDER_REGISTRY_KV"
# id = "<bootstrap injected>"

# Subumbra manifest — all supported providers as full inline policies.
# Copy to subumbra.yaml, uncomment the providers you need, fill in values, then bootstrap.
#
# Usage:
#   cp subumbra.example.yaml subumbra.yaml
#   # Edit subumbra.yaml: uncomment providers, set adapters and secret_ref values, then:
#   ./bootstrap.sh
#
# Adding a provider after initial bootstrap:
#   1. Uncomment and configure the provider block in subumbra.yaml
#   2. Re-run ./bootstrap.sh — the new key is provisioned; existing keys are preserved
#
# Day-2 changes (no full re-bootstrap needed):
#   ./bootstrap.sh --publish-policy <key_id>           re-publish policy/adapter changes to KV
#   ./bootstrap.sh --add-adapter <key_id> <adapter>    add an adapter to an existing key
#   ./bootstrap.sh --revoke-adapter <key_id> <adapter> remove an adapter from a key
#   ./bootstrap.sh --rotate                            rotate provider secrets (offline, no CF interaction)
#
# ⚠️  Uncomment provider blocks carefully — each active key is provisioned in Cloudflare
#    on the next bootstrap run. Use unique_vault: true for keys that require full isolation.
#
# ─────────────────────────────────────────────────────────────────────────────
# Inline policy field guide
# ─────────────────────────────────────────────────────────────────────────────
#   policy:                    (required if template is omitted)
#     policy_id:               (required) human-readable identifier for audit/UI display
#     protocol:                (required) http_rest | openai_compatible
#     capability_class:        (required) llm | embedding | tts | stt | image | code |
#                                         search | data | messaging | storage |
#                                         email_send | source_control_read | custom_rest
#     source:                  (required) env  ← only valid value
#     target:                  (required)
#       host:                  (required) upstream API hostname — no scheme, path, or wildcards
#       base_path:             (optional) path prefix prepended to all upstream calls
#     auth:                    (required)
#       scheme:                (required) bearer | header | basic | query
#       header_name:           (required only when scheme is header) e.g. x-api-key
#                              omit entirely for bearer, basic, or query schemes
#     allow:                   (required)
#       adapters:              (required) adapter IDs allowed — must match top-level adapters list
#                              Revocation granularity: all keys sharing the same adapter name share
#                              one token. To revoke one app without affecting others, assign each
#                              app a distinct adapter name (e.g. litellm, openwebui, bifrost) and
#                              use --revoke-adapter <key_id> <adapter> for targeted removal.
#       methods:               (required) HTTP methods the Worker will forward
#       path_prefixes:         (required) upstream paths allowed — no wildcards, must start with /
#       content_types:         (required) accepted request Content-Type values
#       max_body_bytes:        (required) maximum request body size in bytes
#       request_headers:       (optional) exact request headers forwarded after invariant stripping;
#                              if omitted/empty, current pass-through behavior is preserved
#     deny:                    (optional)
#       path_prefixes:         (optional) paths always blocked regardless of allow list
#     intent:                  (optional)
#       policy_match:          (optional) intent verification profile name
#       trust:                 (optional)
#         allowed_initiators:      (optional) allowed request initiator labels
#         allowed_content_sources: (optional) allowed content-source labels
#     response:                (optional)
#       allow_headers:         (optional) exact response headers preserved after invariant stripping;
#                              if omitted/empty, current pass-through behavior is preserved
#       deny_patterns:         (optional) substrings triggering 403 if found in buffered response body
#     velocity:                (optional)
#                              Built-in signed templates ship active default velocity values.
#                              Inline policy velocity remains the override path when you use a
#                              full inline policy or a template plus inline policy override.
#       adapter_rpm:           (optional) per-adapter rate limit (requests/minute)
#       key_rpm:               (optional) per-key aggregate rate limit (requests/minute)
#       breaker_failures:      (optional) consecutive failures before circuit breaker opens
#       breaker_cooldown_seconds: (optional) seconds before circuit breaker resets

keys:

  # ── Anthropic ──────────────────────────────────────────────────────────────
  # Anthropic Messages API — Claude 3, 3.5, 3.7, and future models.
  # Auth: x-api-key header (not bearer — see header_name below).
  # secret_ref: ANTHROPIC_KEY — set in .env.bootstrap or enter when the wizard prompts.
  # Docs: https://docs.anthropic.com/en/api
  # ⚠️  Remove the leading '# ' from required lines below to activate this provider.
  #    Optional fields stay commented — uncomment individually as needed.
  #
  # - key_id: anthropic_prod
  #   provider: anthropic
  #   secret_ref: ANTHROPIC_KEY
  #   adapters: [universal]           # replace with your adapter name(s)
  #   unique_vault: false             # true = dedicated Durable Object vault for this key
  #   policy:
  #     policy_id: anthropic-prod-policy
  #     protocol: http_rest
  #     capability_class: llm
  #     source: env
  #     target:
  #       host: api.anthropic.com
  #       base_path: /v1
  #     auth:
  #       scheme: header
  #       header_name: x-api-key
  #     allow:
  #       adapters: [universal]
  #       methods: [GET, POST]
  #       path_prefixes: [/v1/messages, /v1/models]
  #       content_types: [application/json]
  #       max_body_bytes: 8388608     # 8MB — covers ~200K token context in JSON; verify at docs.anthropic.com
  #       request_headers: [content-type, accept, anthropic-version]
  #     # deny:
  #     #   path_prefixes: []
  #     # intent:
  #     #   policy_match: subumbra-intent-baseline-v1
  #     #   trust:
  #     #     allowed_initiators: []
  #     #     allowed_content_sources: []
  #     response:
  #       allow_headers:
  #         - content-type
  #         - request-id
  #         - retry-after
  #         - anthropic-ratelimit-input-tokens-limit
  #         - anthropic-ratelimit-input-tokens-remaining
  #         - anthropic-ratelimit-input-tokens-reset
  #         - anthropic-ratelimit-output-tokens-limit
  #         - anthropic-ratelimit-output-tokens-remaining
  #         - anthropic-ratelimit-output-tokens-reset
  #         - anthropic-ratelimit-requests-limit
  #         - anthropic-ratelimit-requests-remaining
  #         - anthropic-ratelimit-requests-reset
  #         - anthropic-ratelimit-tokens-limit
  #         - anthropic-ratelimit-tokens-remaining
  #         - anthropic-ratelimit-tokens-reset
  #       # deny_patterns: [api_key]
  #     # velocity:
  #     #   adapter_rpm: 120
  #     #   key_rpm: 600
  #     #   breaker_failures: 3
  #     #   breaker_cooldown_seconds: 30


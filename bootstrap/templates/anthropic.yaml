# Subumbra built-in provider template — anthropic
# Anthropic Messages API (Claude 3.x, Claude 4.x, etc.)
# Auth: header (x-api-key)  |  Docs: https://docs.anthropic.com/en/api/getting-started
#
# Reference in subumbra.yaml:
#   - key_id: anthropic_prod
#     provider: anthropic
#     secret_ref: ANTHROPIC_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: anthropic
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: http_rest
capability_class: llm
target:
  host: api.anthropic.com
  base_path: /v1
auth:
  scheme: header
  header_name: x-api-key
allow:
  methods: [GET, POST]
  path_prefixes: [/v1/messages, /v1/models]
  content_types: [application/json]
  max_body_bytes: 8388608   # 8MB — covers Claude 200K context in JSON; verify at docs.anthropic.com

# ── Optional — uncomment as needed ─────────────────────────────────────────
# deny:
#   path_prefixes: [/v1/complete]
# intent:
#   policy_match: subumbra-intent-baseline-v1
#   trust:
#     allowed_initiators: []
#     allowed_content_sources: []
# response:
#   deny_patterns: [sk-ant-]
velocity:
  adapter_rpm: 120
  key_rpm: 600
  breaker_failures: 3
  breaker_cooldown_seconds: 30

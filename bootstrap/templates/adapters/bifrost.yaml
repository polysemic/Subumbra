adapter_id: bifrost
display_name: Bifrost
category: llm_gateway
docs_path: docs/apps/bifrost/
allow_adapters:
  - bifrost-app
default_token_env_var: SUBUMBRA_TOKEN_BIFROST
verified: true
config_format:
  type: env_file
  target: .env   # Bifrost deployment directory
  fields:
    - name: BIFROST_SUBUMBRA_TOKEN
      value: "{adapter_token}"
      note: "Bifrost credential for its Subumbra provider"
config_notes: >
  Bifrost also requires a JSON provider config with base_url set per provider.
  Use docs/apps/bifrost/templates/ as the starting point — set each provider's
  base_url to http://subumbra-proxy:8090/t/{key_id} (Bifrost appends the
  provider path suffix itself, e.g. /v1/chat/completions for OpenAI).

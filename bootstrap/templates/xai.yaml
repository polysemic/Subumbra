# Subumbra built-in provider template — xai
# xAI Grok OpenAI-compatible Chat and Completions API
# Auth: bearer  |  Docs: https://docs.x.ai/api
#
# Reference in subumbra.yaml:
#   - key_id: xai_prod
#     provider: xai
#     secret_ref: XAI_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: xai
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: openai_compatible
capability_class: llm
target:
  host: api.x.ai
  base_path: /v1
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/v1/chat, /v1/completions, /v1/models]
  content_types: [application/json]
  max_body_bytes: 8388608   # 8MB — covers Grok 131K context in JSON; verify at docs.x.ai


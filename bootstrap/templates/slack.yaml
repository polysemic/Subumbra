# Subumbra built-in provider template — slack
# Slack Web API — bot token or user token as bearer credential
# Auth: bearer  |  Docs: https://api.slack.com/web
#
# Reference in subumbra.yaml:
#   - key_id: slack_prod
#     provider: slack
#     secret_ref: SLACK_TOKEN
#     adapters: [universal]
#     unique_vault: false
#     template: slack
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: http_rest
capability_class: custom_rest
target:
  host: api.slack.com
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/api]
  content_types: [application/json]
  max_body_bytes: 1048576   # 1MB — Slack message and event payloads are small; verify at api.slack.com


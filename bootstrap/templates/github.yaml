adapter_notes: GitHub REST API; use a classic PAT or fine-grained token as the provider
  secret.
allow:
  content_types:
  - application/json
  max_body_bytes: 1048576
  methods:
  - GET
  - POST
  - PATCH
  - PUT
  - DELETE
  path_prefixes:
  - /repos
  - /user
  - /orgs
  - /graphql
  - /zen
auth:
  scheme: bearer
capability_class: source_control_read
protocol: http_rest
target:
  host: api.github.com

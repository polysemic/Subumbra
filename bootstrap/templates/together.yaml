# Subumbra built-in provider template — together
# Together AI OpenAI-compatible Chat, Completions, and Embeddings API
# Auth: bearer  |  Docs: https://docs.together.ai/reference/chat-completions
#
# Reference in subumbra.yaml:
#   - key_id: together_prod
#     provider: together
#     secret_ref: TOGETHER_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: together
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: openai_compatible
capability_class: llm
target:
  host: api.together.xyz
  base_path: /v1
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/v1/chat, /v1/completions, /v1/models]
  content_types: [application/json]
  max_body_bytes: 8388608   # 8MB — covers Together AI 128K context in JSON; verify at docs.together.ai

# ── Optional — uncomment as needed ─────────────────────────────────────────
# deny:
#   path_prefixes: [/v1/fine-tunes]
# intent:
#   policy_match: subumbra-intent-baseline-v1
#   trust:
#     allowed_initiators: []
#     allowed_content_sources: []
# response:
#   deny_patterns: []
velocity:
  adapter_rpm: 120
  key_rpm: 600
  breaker_failures: 3
  breaker_cooldown_seconds: 30

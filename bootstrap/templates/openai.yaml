# Subumbra built-in provider template — openai
# OpenAI Chat Completions and related endpoints (GPT-4o, o1, o3, etc.)
# Auth: bearer  |  Docs: https://platform.openai.com/docs/api-reference
#
# Reference in manifest.yaml:
#   - key_id: openai_prod
#     provider: openai
#     secret_ref: OPENAI_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: openai
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See manifest.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: openai_compatible
capability_class: llm
target:
  host: api.openai.com
  base_path: /v1
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/v1/chat, /v1/completions, /v1/models]
  content_types: [application/json]
  max_body_bytes: 8388608   # 8MB — covers GPT-4o 128K context in JSON; verify at platform.openai.com
  request_headers: [content-type, accept]

# ── Optional — uncomment as needed ─────────────────────────────────────────
# deny:
#   path_prefixes: [/v1/fine-tuning, /v1/assistants]
# intent:
#   policy_match: subumbra-intent-baseline-v1
#   trust:
#     allowed_initiators: []
#     allowed_content_sources: []
# response:
#   deny_patterns: [sk-]
response:
  allow_headers:
    - content-type
    - x-request-id
    - retry-after
    - x-ratelimit-limit-requests
    - x-ratelimit-limit-tokens
    - x-ratelimit-remaining-requests
    - x-ratelimit-remaining-tokens
    - x-ratelimit-reset-requests
    - x-ratelimit-reset-tokens
velocity:
  consumer_rpm: 120
  key_rpm: 600
  breaker_failures: 3
  breaker_cooldown_seconds: 30

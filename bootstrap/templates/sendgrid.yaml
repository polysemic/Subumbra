# Subumbra built-in provider template — sendgrid
# Twilio SendGrid v3 Mail Send and Account APIs
# Auth: bearer  |  Docs: https://docs.sendgrid.com/api-reference
#
# Reference in subumbra.yaml:
#   - key_id: sendgrid_prod
#     provider: sendgrid
#     secret_ref: SENDGRID_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: sendgrid
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: http_rest
capability_class: email_send
target:
  host: api.sendgrid.com
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/v3/mail, /v3/scopes, /v3/user]
  content_types: [application/json]
  max_body_bytes: 10485760   # 10MB — covers bulk personalization payloads; SendGrid limit is 30MB; verify at docs.sendgrid.com

# ── Optional — uncomment as needed ─────────────────────────────────────────
# deny:
#   path_prefixes: [/v3/api_keys, /v3/subusers]
# intent:
#   policy_match: subumbra-intent-baseline-v1
#   trust:
#     allowed_initiators: []
#     allowed_content_sources: []
# response:
#   deny_patterns: []
velocity:
  adapter_rpm: 60
  key_rpm: 300
  breaker_failures: 3
  breaker_cooldown_seconds: 30

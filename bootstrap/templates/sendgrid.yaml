adapter_notes: SendGrid v3 Mail Send and related APIs.
allow:
  content_types:
  - application/json
  max_body_bytes: 1048576
  methods:
  - GET
  - POST
  path_prefixes:
  - /v3/mail
  - /v3/scopes
  - /v3/user
auth:
  scheme: bearer
capability_class: email_send
protocol: http_rest
target:
  host: api.sendgrid.com

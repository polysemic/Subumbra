# Subumbra built-in provider template — openrouter
# OpenRouter OpenAI-compatible routing API (access 200+ models via one key)
# Auth: bearer  |  Docs: https://openrouter.ai/docs/quick-start
#
# Reference in subumbra.yaml:
#   - key_id: openrouter_prod
#     provider: openrouter
#     secret_ref: OPENROUTER_KEY
#     adapters: [universal]
#     unique_vault: false
#     template: openrouter
#
# To override any field or add optional controls, replace template: with a full
# inline policy block. See subumbra.example.yaml for the complete field reference.
#
# Updating policy after bootstrap (no re-bootstrap required):
#   ./bootstrap.sh --publish-policy <key_id>

# ── Required ────────────────────────────────────────────────────────────────
protocol: openai_compatible
capability_class: llm
target:
  host: openrouter.ai
  base_path: /api/v1
auth:
  scheme: bearer
allow:
  methods: [GET, POST]
  path_prefixes: [/api/v1/chat, /api/v1/completions, /api/v1/models]
  content_types: [application/json]
  max_body_bytes: 16777216   # 16MB — routes to providers with up to 1M+ token contexts; verify at openrouter.ai/docs

# ── Optional — uncomment as needed ─────────────────────────────────────────
# deny:
#   path_prefixes: []
# intent:
#   policy_match: subumbra-intent-baseline-v1
#   trust:
#     allowed_initiators: []
#     allowed_content_sources: []
# response:
#   deny_patterns: []
velocity:
  adapter_rpm: 120
  key_rpm: 600
  breaker_failures: 3
  breaker_cooldown_seconds: 30

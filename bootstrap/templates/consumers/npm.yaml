consumer_id: npm
display_name: npm CLI
category: automation
docs_path: docs/apps/npm/install.md
allow_adapters:
  - npm
default_token_env_var: SUBUMBRA_TOKEN_NPM
verified: true
config_format:
  type: env_file
  target: .npmrc
  fields:
    - name: registry
      value: "http://subumbra-proxy:8090/t/{key_id}/"
      note: "Set the registry for the package or scope you publish through Subumbra"
    - name: //subumbra-proxy:8090/t/{key_id}/:_authToken
      value: "{consumer_token}"
      note: "Path-scoped Subumbra adapter token; npm must send this on both GET and PUT"
config_notes: >
  Use a path-scoped .npmrc entry for the Subumbra transparent route. The real
  upstream npm token stays in the Cloudflare vault and never belongs in .npmrc
  on the publishing machine.

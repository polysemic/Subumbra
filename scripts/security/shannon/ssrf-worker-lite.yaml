description: "Subumbra staging worker-only SSRF pass. Focus on target_url validation and upstream routing in the Worker."
vuln_classes: [ssrf]

pipeline:
  retry_preset: subscription
  max_concurrent_pipelines: 1

rules_of_engagement: |
  - Target only the staging Worker URL.
  - Do not scan arbitrary internet hosts.
  - Keep testing focused on target_url validation and upstream host enforcement.
  - Throttle to under 2 requests per second.

rules:
  focus:
    - description: "Worker target validation and routing"
      type: code_path
      value: "worker/src/worker.js"
    - description: "Worker bindings"
      type: code_path
      value: "worker/wrangler.toml"
    - description: "Canonical worker proxy route"
      type: url_path
      value: "/proxy"

report:
  min_severity: low
  min_confidence: medium

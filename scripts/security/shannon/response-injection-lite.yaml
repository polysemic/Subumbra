description: "Subumbra staging response injection pass. Focus on upstream response handling, deny_patterns scanning, and header injection via the Worker proxy route."
vuln_classes: [injection]

pipeline:
  retry_preset: subscription
  max_concurrent_pipelines: 1

rules_of_engagement: |
  - Target only the staging Worker URL.
  - Keep testing focused on response body handling and header injection from upstream.
  - Do not scan arbitrary internet hosts.
  - Throttle to under 2 requests per second.

rules:
  focus:
    - description: "Worker response handling and deny_patterns enforcement"
      type: code_path
      value: "worker/src/worker.js"
    - description: "Adapter contract response surface"
      type: code_path
      value: "docs/adapter-contract.md"
    - description: "Canonical worker proxy route"
      type: url_path
      value: "/proxy"

report:
  min_severity: low
  min_confidence: medium

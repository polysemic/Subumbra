# ─────────────────────────────────────────────────────────────────────────────
# Networks
#   internal  — air-gapped, no outbound internet (subumbra-keys, ui, bootstrap)
#   external  — internet-capable (subumbra-proxy, ui host publishing, cloudflared)
# ─────────────────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true # Docker enforces: no outbound routing
  external:
    driver: bridge
  # Join pre-existing testbed network created by: docker network create subumbra-net
  # external: true is the Compose property meaning "do not create; find by name"
  # (unrelated to the local 'external' bridge network above)
  subumbra-net:
    external: true
    name: subumbra-net

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  keys_data:
    # Shared between bootstrap (write) and subumbra-keys (read)
    driver: local
  subumbra_audit_data:
    # Durable Subumbra audit trail (Round 31)
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-keys  —  encrypted blob store, reachable from internal-network services only
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-keys:
    build:
      context: ./subumbra-keys
      dockerfile: Dockerfile
    container_name: subumbra-keys
    restart: unless-stopped
    networks:
      - internal
    # Deliberately NOT published to host ports
    volumes:
      - keys_data:/app/data
      - subumbra_audit_data:/app/audit
    environment:
      SUBUMBRA_ADAPTER_REGISTRY: ${SUBUMBRA_ADAPTER_REGISTRY}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      DATA_DIR: /app/data
      AUDIT_DIR: /app/audit
      AUDIT_MAX_ROWS: ${AUDIT_MAX_ROWS:-10000}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-ui  —  management dashboard, published to host on 6563
  #        on internal (reaches subumbra-keys) + external (required for host
  #        port mapping — Docker's internal: true blocks publishing otherwise)
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: subumbra-ui
    restart: unless-stopped
    networks:
      - internal # reaches subumbra-keys via Docker DNS
      - external # required for host port mapping (internal: true blocks it)
    ports:
      - "127.0.0.1:6563:8080" # Localhost-only — do not expose externally
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_UI}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      # Optional: set both for HTTP Basic Auth; leave unset for CF Access mode.
      UI_USERNAME: ${UI_USERNAME:-}
      UI_PASSWORD: ${UI_PASSWORD:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-probe  —  dedicated second-adapter proof container
  #   Run with: docker compose --profile probe run --rm subumbra-probe
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-probe:
    build:
      context: ./subumbra-probe
      dockerfile: Dockerfile
    container_name: subumbra-probe
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - probe
    networks:
      - internal
      - external
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_PROBE:-}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      PROBE_ALLOWED_KEYS: ${PROBE_ALLOWED_KEYS:-}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy

  subumbra-proxy:
    build:
      context: ./subumbra-proxy
      dockerfile: Dockerfile
    container_name: subumbra-proxy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - internal
      - external
      - subumbra-net
    ports:
      - "127.0.0.1:10199:8090"
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_PROXY}
      SUBUMBRA_ADAPTER_REGISTRY: ${SUBUMBRA_ADAPTER_REGISTRY}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  subumbra-agent:
    build:
      context: ./subumbra-agent
      dockerfile: Dockerfile
    container_name: subumbra-agent
    user: "1000:1000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - internal
    environment:
      SUBUMBRA_AGENT_ADAPTER_ID: ${SUBUMBRA_AGENT_ADAPTER_ID:-sshtest}
      SUBUMBRA_AGENT_ADAPTER_TOKEN: ${SUBUMBRA_TOKEN_SSHTEST:-}
      SUBUMBRA_AGENT_PROXY_URL: http://subumbra-proxy:8090
      SUBUMBRA_AGENT_SOCKET_PATH: /run/subumbra/ssh-agent.sock
      SUBUMBRA_AGENT_KEYS_PATH: /app/data/keys.json
    volumes:
      # Mount the whole keys_data volume read-only at /app/data. We can't use a
      # per-file `volume.subpath: keys.json` mount because day-2 commands
      # (--add-ssh-key / --rotate-ssh-key / --revoke-ssh-key) rewrite keys.json
      # atomically via rename, which replaces the inode and is not picked up
      # by single-file bind mounts. Reading from the directory mount makes the
      # rewrite visible immediately.
      # Security: runtime.env in this volume is mode 0600 owned by root and
      # remains unreadable to the non-root agent (uid 1000). Only the
      # world-readable files (keys.json, kv-config.json, public_key.pem,
      # system-integrity.json) are reachable — exactly what the agent needs.
      - type: volume
        source: keys_data
        target: /app/data
        read_only: true
      - type: bind
        source: ${XDG_RUNTIME_DIR}/subumbra
        target: /run/subumbra
    depends_on:
      subumbra-proxy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_UNIX); s.settimeout(1); s.connect('/run/subumbra/ssh-agent.sock'); s.close()" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # bootstrap  —  one-shot key generation
  #
  #   Interactive or automation / CI (both use the host wrapper):
  #     ./bootstrap.sh    (automation: populate .env.bootstrap first)
  # ───────────────────────────────────────────────────────────────────────────
  bootstrap:
    build:
      context: ./bootstrap
      dockerfile: Dockerfile
    container_name: subumbra-bootstrap
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - bootstrap
    networks:
      - internal # writes to keys_data volume
      - external # needs internet for wrangler deploy + CF API
    volumes:
      - keys_data:/app/data
      # Mount worker source so bootstrap can deploy via wrangler
      - ./worker:/app/worker:ro
      # Manifest is mounted dynamically by bootstrap.sh (subumbra.yaml preferred, subumbra.json fallback)
    env_file:
      # required: false — wizard runs when file is absent (interactive mode)
      # Populate this file for CI/automation (headless) mode.
      - path: .env.bootstrap
        required: false
    environment:
      DATA_DIR: /app/data
      SUBUMBRA_ADAPTER_REGISTRY: ${SUBUMBRA_ADAPTER_REGISTRY:-}

  # ───────────────────────────────────────────────────────────────────────────
  # cloudflared  —  optional Cloudflare Tunnel; run with: --profile tunnel
  # ───────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    networks:
      - external
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}

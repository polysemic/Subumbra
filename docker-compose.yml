# ─────────────────────────────────────────────────────────────────────────────
# Networks
#   internal  — air-gapped, no outbound internet (subumbra-keys, ui, bootstrap)
#   external  — internet-capable (subumbra-proxy, ui host publishing, cloudflared)
# ─────────────────────────────────────────────────────────────────────────────
networks:
  internal:
    name: subumbra_internal
    driver: bridge
    internal: true # Docker enforces: no outbound routing
  external:
    driver: bridge
  # Join pre-existing testbed network created by: docker network create subumbra-net
  # external: true is the Compose property meaning "do not create; find by name"
  # (unrelated to the local 'external' bridge network above)
  subumbra-net:
    external: true
    name: subumbra-net

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  subumbra_keys_data:
    # Shared between bootstrap (write) and subumbra-keys (read)
    driver: local
  subumbra_audit_data:
    # Durable Subumbra audit trail (Round 31)
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-keys  —  encrypted blob store, reachable from internal-network services only
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-keys:
    build:
      context: ./subumbra-keys
      dockerfile: Dockerfile
    container_name: subumbra-keys
    restart: unless-stopped
    networks:
      - internal
    # Deliberately NOT published to host ports
    volumes:
      - subumbra_keys_data:/app/data
      - subumbra_audit_data:/app/audit
    environment:
      SUBUMBRA_ADAPTER_REGISTRY: ${SUBUMBRA_ADAPTER_REGISTRY}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      DATA_DIR: /app/data
      AUDIT_DIR: /app/audit
      AUDIT_MAX_ROWS: ${AUDIT_MAX_ROWS:-10000}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-ui  —  management dashboard, published to host on 6563
  #        on internal (reaches subumbra-keys) + external (required for host
  #        port mapping — Docker's internal: true blocks publishing otherwise)
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: subumbra-ui
    restart: unless-stopped
    networks:
      - internal # reaches subumbra-keys via Docker DNS
      - external # required for host port mapping (internal: true blocks it)
    ports:
      - "127.0.0.1:6563:8080" # Localhost-only — do not expose externally
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_UI}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
    depends_on:
      subumbra-keys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # subumbra-probe  —  dedicated second-adapter proof container
  #   Run with: docker compose --profile probe run --rm subumbra-probe
  # ───────────────────────────────────────────────────────────────────────────
  subumbra-probe:
    build:
      context: ./subumbra-probe
      dockerfile: Dockerfile
    container_name: subumbra-probe
    profiles:
      - probe
    networks:
      - internal
      - external
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_PROBE}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      PROBE_ALLOWED_KEYS: ${PROBE_ALLOWED_KEYS:-}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy

  subumbra-proxy:
    build:
      context: ./subumbra-proxy
      dockerfile: Dockerfile
    container_name: subumbra-proxy
    restart: unless-stopped
    networks:
      - internal
      - external
      - subumbra-net
    ports:
      - "127.0.0.1:10199:8090"
    environment:
      SUBUMBRA_ACCESS_TOKEN: ${SUBUMBRA_TOKEN_PROXY}
      SUBUMBRA_ADAPTER_REGISTRY: ${SUBUMBRA_ADAPTER_REGISTRY}
      SUBUMBRA_HMAC_KEY: ${SUBUMBRA_HMAC_KEY}
      SUBUMBRA_KEYS_URL: http://subumbra-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      subumbra-keys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # bootstrap  —  one-shot key generation
  #
  #   Interactive (human operator):
  #     docker compose --profile bootstrap run --rm -it bootstrap
  #
  #   Automation / CI (requires populated .env.bootstrap):
  #     docker compose --profile bootstrap run --rm bootstrap
  # ───────────────────────────────────────────────────────────────────────────
  bootstrap:
    build:
      context: ./bootstrap
      dockerfile: Dockerfile
    container_name: subumbra-bootstrap
    profiles:
      - bootstrap
    networks:
      - internal # writes to subumbra_keys_data volume
      - external # needs internet for wrangler deploy + CF API
    volumes:
      - subumbra_keys_data:/app/data
      # Mount worker source so bootstrap can deploy via wrangler
      - ./worker:/app/worker:ro
    env_file:
      # required: false — wizard runs when file is absent (interactive mode)
      # Populate this file for CI/automation (headless) mode.
      - path: .env.bootstrap
        required: false
    environment:
      DATA_DIR: /app/data

  # ───────────────────────────────────────────────────────────────────────────
  # cloudflared  —  optional Cloudflare Tunnel; run with: --profile tunnel
  # ───────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    networks:
      - external
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}

# ─────────────────────────────────────────────────────────────────────────────
# Networks
#   internal  — air-gapped, no outbound internet (forge-keys, ui, bootstrap)
#   external  — internet-capable (litellm, cloudflared)
#   litellm sits on BOTH so it can reach forge-keys AND the CF Worker
# ─────────────────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true # Docker enforces: no outbound routing
  external:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  forge_keys_data:
    # Shared between bootstrap (write) and forge-keys (read)
    driver: local
  forge_audit_data:
    # Durable forge audit trail (Round 31)
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ───────────────────────────────────────────────────────────────────────────
  # forge-keys  —  encrypted blob store, reachable from internal-network services only
  # ───────────────────────────────────────────────────────────────────────────
  forge-keys:
    build:
      context: ./forge-keys
      dockerfile: Dockerfile
    container_name: forge-keys
    restart: unless-stopped
    networks:
      - internal
    # Deliberately NOT published to host ports
    volumes:
      - forge_keys_data:/app/data
      - forge_audit_data:/app/audit
    environment:
      FORGE_ADAPTER_REGISTRY: ${FORGE_ADAPTER_REGISTRY}
      FORGE_HMAC_KEY: ${FORGE_HMAC_KEY}
      DATA_DIR: /app/data
      AUDIT_DIR: /app/audit
      AUDIT_MAX_ROWS: ${AUDIT_MAX_ROWS:-10000}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────────
  # litellm  —  OpenAI-compatible proxy; bridges internal + external networks
  # ───────────────────────────────────────────────────────────────────────────
  litellm:
    # Pinned by tag+digest — main-latest currently resolves to LiteLLM 1.82.6
    # as verified in-container on 2026-03-29.
    # To update: docker pull ghcr.io/berriai/litellm:main-latest
    #            docker inspect --format '{{index .RepoDigests 0}}' ghcr.io/berriai/litellm:main-latest
    #            update tag+digest here + re-verify before deploying
    image: ghcr.io/berriai/litellm:main-latest@sha256:7c311546c25e7bb6e8cafede9fcd3d0d622ac636b5c9418befaa32e85dfb0186
    container_name: litellm
    restart: unless-stopped
    networks:
      - internal # reaches forge-keys via Docker DNS: http://forge-keys:9090
      - external # reaches CF Worker and API providers
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/custom_callbacks.py:/app/custom_callbacks.py:ro
      - ./worker/src/providers.json:/worker/src/providers.json:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DEEPSEEK_API_BASE: https://api.deepseek.com/v1
      # Forge auth — non-sensitive tokens generated by bootstrap
      FORGE_ACCESS_TOKEN: ${FORGE_TOKEN_LITELLM}
      FORGE_HMAC_KEY: ${FORGE_HMAC_KEY}
      FORGE_URL: http://forge-keys:9090
      # Cloudflare Worker endpoint
      CF_WORKER_URL: ${CF_WORKER_URL}
      # Optional: CF Access service token if Worker is behind CF Access
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
      # KEYVAULT_PROVIDER_PREFIXES='{"my_provider":"/api/v2"}'
    command: >
      --config /app/config.yaml --port 4000 --num_workers 1
    depends_on:
      forge-keys:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────────────────
  # ui  —  management dashboard, published to host on 8080
  #        on internal (reaches forge-keys) + external (required for host
  #        port mapping — Docker's internal: true blocks publishing otherwise)
  # ───────────────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: keyvault-ui
    restart: unless-stopped
    networks:
      - internal  # reaches forge-keys via Docker DNS
      - external  # required for host port mapping (internal: true blocks it)
    ports:
      - "127.0.0.1:8080:8080" # Localhost-only — do not expose externally
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      FORGE_ACCESS_TOKEN: ${FORGE_TOKEN_UI}
      FORGE_URL: http://forge-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
    depends_on:
      forge-keys:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────────────────
  # adapter-probe  —  dedicated second-adapter proof container
  #   Run with: docker compose --profile probe run --rm adapter-probe
  # ───────────────────────────────────────────────────────────────────────────
  adapter-probe:
    build:
      context: ./adapter-probe
      dockerfile: Dockerfile
    container_name: adapter-probe
    profiles:
      - probe
    networks:
      - internal
      - external
    environment:
      FORGE_ACCESS_TOKEN: ${FORGE_TOKEN_PROBE}
      FORGE_HMAC_KEY: ${FORGE_HMAC_KEY}
      FORGE_URL: http://forge-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      PROBE_ALLOWED_KEYS: ${PROBE_ALLOWED_KEYS:-}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      forge-keys:
        condition: service_healthy

  keyvault-proxy:
    build:
      context: ./keyvault-proxy
      dockerfile: Dockerfile
    container_name: keyvault-proxy
    networks:
      - internal
      - external
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      FORGE_ACCESS_TOKEN: ${FORGE_TOKEN_PROXY}
      FORGE_HMAC_KEY: ${FORGE_HMAC_KEY}
      FORGE_URL: http://forge-keys:9090
      CF_WORKER_URL: ${CF_WORKER_URL}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
    depends_on:
      forge-keys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # bootstrap  —  one-shot key generation
  #
  #   Interactive (human operator):
  #     docker compose --profile bootstrap run --rm -it bootstrap
  #
  #   Automation / CI (requires populated .env.bootstrap):
  #     docker compose --profile bootstrap run --rm bootstrap
  # ───────────────────────────────────────────────────────────────────────────
  bootstrap:
    build:
      context: ./bootstrap
      dockerfile: Dockerfile
    container_name: keyvault-bootstrap
    profiles:
      - bootstrap
    networks:
      - internal # writes to forge_keys_data volume
      - external # needs internet for wrangler deploy + CF API
    volumes:
      - forge_keys_data:/app/data
      # Mount worker source so bootstrap can deploy via wrangler
      - ./worker:/app/worker:ro
    env_file:
      # required: false — wizard runs when file is absent (interactive mode)
      # Populate this file for CI/automation (headless) mode.
      - path: .env.bootstrap
        required: false
    environment:
      DATA_DIR: /app/data

  # ───────────────────────────────────────────────────────────────────────────
  # cloudflared  —  optional Cloudflare Tunnel; run with: --profile tunnel
  # ───────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    networks:
      - external
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
